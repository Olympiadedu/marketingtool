<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Noto+Serif+KR:wght@400;700&family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic+Coding:wght@400;700&family=Gaegu:wght@400;700&family=Gowun+Batang:wght@400;700&family=Sunflower:wght@300;500;700&family=Hahmlet:wght@400;700;900&family=IBM+Plex+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gugi&family=Do+Hyeon&family=Jua&family=Cute+Font&family=Yeon+Sung&family=Single+Day&family=East+Sea+Dokdo&family=Gamja+Flower&family=Gowun+Dodum&family=Song+Myung&family=Kirang+Haerang&family=Dokdo&family=Poor+Story&family=Hi+Melody&family=Orbit&family=Stylish&family=Nanum+Pen+Script&family=Nanum+Brush+Script&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Montserrat:wght@400;700;900&family=Poppins:wght@400;700;900&family=Raleway:wght@400;700;900&family=Oswald:wght@400;700&family=Lora:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Dancing+Script:wght@400;700&family=Bebas+Neue&family=Pacifico&family=Abril+Fatface&family=Anton&family=Cinzel:wght@400;700;900&family=Great+Vibes&family=Satisfy&family=Lobster&family=Permanent+Marker&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="sidebar-brand"><span class="brand-mark">MTT</span><span>MarketingTool</span></div>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-section-title">도구</div>
    <div class="sidebar-item active" onclick="showPage('list')" id="nav-list">
      <span class="nav-icon">📋</span>성적우수 이미지
    </div>
    <div class="sidebar-item" style="opacity:.4;cursor:not-allowed;" title="준비중">
      <span class="nav-icon">🖼</span>자유 편집 <span style="font-size:10px;background:#e5e7eb;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle;">준비중</span>
    </div>
    <div class="sidebar-item" onclick="showPage('blog')" id="nav-blog">
      <span class="nav-icon">✏️</span>블로그 작성
    </div>
    <div class="sidebar-item" onclick="showPage('monitor')" id="nav-monitor">
      <span class="nav-icon">🏫</span>경쟁학원 모니터링
    </div>
  </div>
  <div class="sidebar-bottom">
    <div class="sidebar-item" id="nav-settings" onclick="showPage('settings-ai')">
      <span class="nav-icon">⚙️</span>설정
    </div>
    <div class="sidebar-subnav" id="sidebar-subnav-settings" style="display:none;">
      <div class="sidebar-subitem active" id="nav-settings-ai" onclick="showPage('settings-ai')">AI 설정</div>
      <div class="sidebar-subitem" id="nav-settings-prompt" onclick="showPage('settings-prompt')">프롬프트 설정</div>
    </div>
  </div>
</div>

<div class="main" id="main-container">
  <!-- pages/*.html 이 동기 로드 후 여기에 삽입됩니다 -->
</div>

<div id="toast" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;z-index:2000;pointer-events:none;"></div>

<!-- 1. 다른 스크립트보다 먼저 pages/*.html을 동기 로드해 DOM에 삽입 -->
<script>
(function() {
  var container = document.getElementById('main-container');
  var pages = ['pages/image.html', 'pages/blog.html', 'pages/monitor.html', 'pages/settings.html'];
  pages.forEach(function(url) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, false); // synchronous — 로컬 서버 전용
    xhr.send(null);
    if (xhr.status === 200) {
      container.insertAdjacentHTML('beforeend', xhr.responseText);
    } else {
      console.error('페이지 로드 실패:', url, xhr.status);
    }
  });
})();
</script>

<!-- 2. DOM이 준비된 후 각 모듈 스크립트 로드 -->
<script src="config.js"></script>
<script src="js/image.js"></script>
<script src="js/monitor.js"></script>
<script src="js/blog.js"></script>
<script src="js/common.js"></script>
</body>
</html>
